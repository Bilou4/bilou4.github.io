<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

{%- include head.html -%}


  <body>
    {%- include header.html -%}

    <div class="container">
      <section id="main_content">
        {{ content }}
        {% for post in site.posts %}
            <p>{{ post.date }}  <a href="{{ post.url}}">{{post.title}}</a></p>
        {% endfor %}
      </section>
    </div>

</body>
</html>
